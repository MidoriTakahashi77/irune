# ============================================================
# E2E Test: 繰り返し予定が未来の日付にも表示されるか検証
# ============================================================
# Prerequisites: calendar-create-event.yaml を先に実行済みであること
# ============================================================
appId: com.irune.app
appTimeout: 15000
---

# --------------------------------------------------
# Setup
# --------------------------------------------------
- launchApp
- openLink: ${E2E_DEEP_LINK}
- assertVisible: "Sun"

# --------------------------------------------------
# Test 1: 毎週の予定が翌週にも表示されるか
# --------------------------------------------------
# 下にスクロールして来週を確認
- swipe:
    direction: UP
    duration: 1500

# 毎週テスト予定が翌週にも表示されているか
- assertVisible: "毎週テスト予定"

# --------------------------------------------------
# Test 2: 日付指定で来月にジャンプして毎月予定を確認
# --------------------------------------------------
- tapOn:
    id: "calendar-number-outline"
- assertVisible: "日付を指定"

# スピナーで来月に変更（スワイプ）
- swipe:
    direction: DOWN
    duration: 500

- tapOn: "OK"

# 毎月テスト予定が来月にも表示されているか
- assertVisible: "毎月テスト予定"

# --------------------------------------------------
# Test 3: 今日に戻る
# --------------------------------------------------
- assertVisible: "今日"
- tapOn: "今日"

# 元の予定がすべて表示されているか
- assertVisible: "基本テスト予定"
