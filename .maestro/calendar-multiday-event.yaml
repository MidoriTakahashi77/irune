# ============================================================
# E2E Test: 複数日にまたがる終日予定の作成と表示
# ============================================================
appId: com.irune.app
appTimeout: 10000
---

# --------------------------------------------------
# Setup
# --------------------------------------------------
- launchApp:
    clearState: true
- openLink: ${E2E_DEEP_LINK}
- assertVisible: "Sun"

# --------------------------------------------------
# Test 1: 3日間の旅行予定を作成
# --------------------------------------------------
- tapOn: "day-10"
- assertVisible: "予定を追加"
- tapOn: "予定を追加"
- inputText: "家族旅行"
- hideKeyboard

# 終日ON
- tapOn: "終日"

# 終了日を3日後に変更
- scrollUntilVisible:
    element: "終了日時"
    direction: DOWN

# 終了日のボタンをタップ
- tapOn:
    text: "終了日時"

# 日付ピッカーでスワイプして3日後に
- swipe:
    direction: DOWN
    duration: 300

- tapOn: "完了"

# 保存
- scrollUntilVisible:
    element: "保存"
    direction: DOWN
- tapOn: "保存"

# --------------------------------------------------
# Test 2: 複数日に表示されているか確認
# --------------------------------------------------
# 旅行予定がカレンダーに表示されている
- assertVisible: "家族旅行"

# --------------------------------------------------
# Test 3: 途中の日をタップしてもイベントが見える
# --------------------------------------------------
- tapOn: "day-12"
- assertVisible: "家族旅行"
