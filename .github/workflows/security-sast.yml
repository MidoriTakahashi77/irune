name: Security SAST

on:
  pull_request:

concurrency:
  group: sast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep-sast:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
      options: --user root
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Semgrep Analysis
        run: semgrep scan --config auto --json --output semgrep.json || true

      - name: Upload SAST Result
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-results
          path: semgrep.json
        if: always()

  report-results:
    runs-on: ubuntu-latest
    needs: semgrep-sast
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          name: semgrep-results
          path: semgrep-results

      - name: Generate SAST Report
        run: |
          SAST_FILE="semgrep-results/semgrep.json"
          SAST_COUNT=$(jq '.results | length // 0' "$SAST_FILE" 2>/dev/null || echo 0)

          echo "## セキュリティ診断レポート (SAST)" > report.md
          echo "" >> report.md
          echo "### 診断サマリー" >> report.md
          echo "| 診断種別 | ステータス | 検出数 |" >> report.md
          echo "| :--- | :--- | :--- |" >> report.md
          echo "| **静的解析 (Semgrep)** | $([ "$SAST_COUNT" -gt 0 ] && echo "検出あり" || echo "クリア") | ${SAST_COUNT} 件 |" >> report.md
          echo "" >> report.md

          if [ "$SAST_COUNT" -gt 0 ]; then
            echo "### 指摘事項詳細" >> report.md
            echo "<details><summary>検出された不備を確認する (${SAST_COUNT}件)</summary>" >> report.md
            echo "" >> report.md
            echo "| 箇所 | カテゴリ | 内容 |" >> report.md
            echo "| :--- | :--- | :--- |" >> report.md
            jq -r '.results[] | "| `" + .path + ":" + (.start.line | tostring) + "` | " + (.extra.metadata.category // "N/A") + " | " + (.extra.message | gsub("\n"; " ")) + " |"' \
              "$SAST_FILE" >> report.md
            echo "" >> report.md
            echo "</details>" >> report.md
          fi

      - name: Post PR Comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --repo "$GITHUB_REPOSITORY" --body-file report.md
