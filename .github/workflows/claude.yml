name: Claude Code

# Disabled: uses Claude API (pay-per-use), not covered by Max plan
# To re-enable, uncomment the 'on:' block and comment out 'on: workflow_dispatch'
on:
  workflow_dispatch:

# Original triggers (uncomment to re-enable):
#  issue_comment:
#    types: [created]
#  pull_request_review_comment:
#    types: [created]

jobs:
  claude:
    name: Claude Code
    runs-on: ubuntu-latest
    if: |
      contains(github.event.comment.body, '@claude') &&
      (github.event.issue.pull_request || github.event_name == 'pull_request_review_comment')
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          trigger_phrase: "@claude"

  claude-issue:
    name: Claude Code (Issue)
    runs-on: ubuntu-latest
    if: |
      contains(github.event.comment.body, '@claude') &&
      !github.event.issue.pull_request &&
      github.event_name == 'issue_comment'
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          trigger_phrase: "@claude"
